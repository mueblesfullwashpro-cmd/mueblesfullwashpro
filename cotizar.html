<!DOCTYPE html>

<style>
*{box-sizing:border-box}
body{
margin:0;

color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}
.card{
width:100%;
max-width:520px;
background:rgba(2,12,36,.92);
border:1px solid rgba(0,200,255,.65);
border-radius:22px;
box-shadow:0 0 35px rgba(0,170,255,.55);

}
h1{
margin:0 0 10px;
text-align:center;
font-size:30px;
text-transform:uppercase;
}
h1 span{color:#00c8ff}
p{
text-align:center;
color:#dff8ff;
line-height:1.5;
margin-bottom:24px;
}
label{
display:block;
font-weight:800;
margin:14px 0 7px;
}
input,select,textarea{
width:100%;
border:1px solid rgba(0,200,255,.55);
background:#061734;
color:white;
border-radius:12px;
padding:14px;
font-size:16px;
outline:none;
}
textarea{min-height:110px;resize:vertical}
button{
width:100%;
margin-top:20px;
border:0;
border-radius:14px;
padding:16px;
font-size:18px;
font-weight:900;
color:white;

box-shadow:0 0 22px rgba(0,170,255,.6);
}
.whatsapp{
display:block;
margin-top:16px;
text-align:center;
background:#18b84b;

padding:15px;
font-weight:900;
}
.back{
display:block;

margin-top:18px;

}
.small{
